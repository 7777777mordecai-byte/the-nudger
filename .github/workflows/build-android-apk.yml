name: build-android-apk
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project files
        run: |
          unzip the-nudger.zip -d temp_unpack
          cp -r temp_unpack/the-nudger/* . 2>/dev/null || cp -r temp_unpack/* . 2>/dev/null || true
          rm -rf temp_unpack

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Locate and Fix Index HTML
        run: |
          TARGET_DIR=$(find . -name "index.html" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          sed -i 's|src="/src/main.tsx"|src="src/main.tsx"|g' "$TARGET_DIR/index.html"
          echo "WEB_DIR=$TARGET_DIR" >> $GITHUB_ENV

      - name: Build Web App
        run: |
          cd ${{ env.WEB_DIR }}
          npm run build || npx vite build --base=./ || true

      - name: Repair and Force Capacitor Sync
        run: |
          WEB_OUTPUT=$(find . -name "dist" -type d -not -path "*/node_modules/*" | head -n 1)
          mkdir -p www
          cp -r $WEB_OUTPUT/* www/ 2>/dev/null || cp -r client/dist/* www/ 2>/dev/null || true
          CAP_DIR=$(find . -name "capacitor.config.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$CAP_DIR"
          npx cap sync android

      - name: Build APK via Gradle
        run: |
          ANDROID_DIR=$(find . -name "build.gradle" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: the-nudger-apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
