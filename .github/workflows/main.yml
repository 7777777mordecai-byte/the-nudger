name: Setup Expo Cloud Config
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup_expo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip and Inject Expo Config
        run: |
          unzip the-nudger.zip -d temp_unpack
          # Target the inner directory where your app code lives
          TARGET_DIR=$(find temp_unpack -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          
          echo "Injecting app.json configuration into $TARGET_DIR"
          
          cat << 'EOF' > "$TARGET_DIR/app.json"
          {
            "expo": {
              "name": "The Nudger",
              "slug": "the-nudger",
              "version": "1.0.0",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "light",
              "splash": {
                "image": "./assets/splash.png",
                "resizeMode": "contain",
                "backgroundColor": "#ffffff"
              },
              "ios": {
                "supportsTablet": true
              },
              "android": {
                "adaptiveIcon": {
                  "foregroundImage": "./assets/adaptive-icon.png",
                  "backgroundColor": "#ffffff"
                },
                "package": "com.thenudger.app"
              },
              "web": {
                "favicon": "./assets/favicon.png"
              }
            }
          }
          EOF
          
          # Re-zip the project back up with the new configuration included
          cd temp_unpack
          zip -r ../the-nudger.zip .
          cd ..
          rm -rf temp_unpack

      - name: Commit Updated Zip File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add the-nudger.zip
          git commit -m "Configure Expo app.json inside source code"
          git push
