name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project files
        run: |
          unzip the-nudger.zip -d temp_folder
          cp -r temp_folder/the-nudger/* . 2>/dev/null || cp -r temp_folder/* . 2>/dev/null || true
          rm -rf temp_folder

      - name: Fix Vite Path Inside HTML
        run: sed -i 's/\/src\/main.tsx/src\/main.tsx/g' client/index.html

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web App
        run: |
          npm run build 

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Build APK via Gradle
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: the-nudger-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
