name: build-android-apk
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project files
        run: |
          unzip the-nudger.zip -d temp_unpack
          if [ -d "temp_unpack/the-nudger" ]; then
            cp -r temp_unpack/the-nudger/* .
          else
            cp -r temp_unpack/* .
          fi
          rm -rf temp_unpack

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Fix Index HTML Path
        run: |
          if [ -f "index.html" ]; then
            sed -i 's|src="/src/main.tsx"|src="src/main.tsx"|g' index.html
          fi

      - name: Build Web App
        run: |
          npm run build || npx vite build --base=./ || true

      - name: Sync Capacitor Android
        run: |
          mkdir -p www
          if [ -d "dist" ]; then
            cp -r dist/* www/
          elif [ -d "client/dist" ]; then
            cp -r client/dist/* www/
          fi
          npx cap sync android

      - name: Build APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: the-nudger-apk
          path: "android/app/build/outputs/apk/debug/app-debug.apk"
