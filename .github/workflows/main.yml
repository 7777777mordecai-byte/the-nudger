name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project files
        run: |
          unzip the-nudger.zip -d temp_unpack
          cp -r temp_unpack/the-nudger/* . 2>/dev/null || cp -r temp_unpack/* . 2>/dev/null || true
          rm -rf temp_unpack

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web App Smartly
        env:
          VITE_ANALYTICS_ENDPOINT: "https://example.com"
          VITE_ANALYTICS_WEBSITE_ID: "test-id"
          VITE_APP_ID: "test-app"
        run: |
          # If the main build fails, try to find where index.html is and build directly from there
          if ! npm run build; then
            echo "Standard build failed, searching for web root..."
            WEB_DIR=$(find . -name "index.html" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
            echo "Found index.html in $WEB_DIR. Fixing paths and building there..."
            cd "$WEB_DIR"
            sed -i 's|/src/main.tsx|src/main.tsx|g' index.html
            npm run build || npx vite build || true
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android || true

      - name: Build APK via Gradle
        run: |
          ANDROID_DIR=$(find . -name "build.gradle" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "Building Android project inside $ANDROID_DIR"
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: the-nudger-apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
