name: Debug Project Structure
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip and Map Directory Structure
        run: |
          unzip the-nudger.zip -d temp_unpack
          echo "=== EXACT FILE STRUCTURE ==="
          ls -R temp_unpack
