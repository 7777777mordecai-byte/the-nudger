name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project files
        run: |
          unzip the-nudger.zip -d temp_unpack
          cp -r temp_unpack/the-nudger/* . 2>/dev/null || cp -r temp_unpack/* . 2>/dev/null || true
          rm -rf temp_unpack

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Force Build with Correct Vite Root
        env:
          VITE_ANALYTICS_ENDPOINT: "https://example.com"
          VITE_ANALYTICS_WEBSITE_ID: "test-id"
          VITE_APP_ID: "test-app"
        run: |
          # Overwrite the build step to target the client folder as the absolute web root
          npx vite build client || npx vite build apps/web || npm run build

      - name: Sync Capacitor
        run: |
          npx cap sync android || true

      - name: Build APK via Gradle
        run: |
          ANDROID_DIR=$(find . -name "build.gradle" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          echo "Building Android project inside $ANDROID_DIR"
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: the-nudger-apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
